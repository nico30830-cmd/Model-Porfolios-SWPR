<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Portfolio Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 40px 36px;
      width: min(360px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #8b949e;
      text-align: center;
    }
    label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #8b949e;
      display: block;
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #3fb950; }
    button {
      width: 100%;
      background: #3fb950;
      color: #0d1117;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 11px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .error {
      font-size: 12px;
      color: #f85149;
      text-align: center;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Model Portfolio Dashboard</div>
    <form method="POST" action="/login">
      <div>
        <label for="pw">Password</label>
        <input id="pw" name="password" type="password" autofocus autocomplete="current-password">
      </div>
      <div class="error" id="err">Incorrect password — try again.</div>
      <button type="submit">Enter</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('err').classList.add('show');
    }
  </script>
</body>
</html>
